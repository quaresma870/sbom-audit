name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*
      - name: Install built wheel in a clean venv
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install "$(echo dist/*.whl)"
          /tmp/smoke-venv/bin/sbom-audit --version
          /tmp/smoke-venv/bin/sbom-audit --help

      - name: "Integration test: real commands, including a real OSV.dev network call"
        # This job's whole point includes verifying the ONE thing that
        # genuinely could not be tested from this project's own local
        # dev sandbox: a real network call to api.osv.dev is not
        # reachable from that environment's network egress allowlist,
        # so this is the first real verification that check_vulnerabilities
        # actually works against the live service, not just against an
        # injected fake transport (already covered by the unit tests).
        run: |
          set -uo pipefail
          trap 'echo "::error::Integration test failed at line $LINENO: $BASH_COMMAND"' ERR
          set -e
          SA=/tmp/smoke-venv/bin/sbom-audit
          WORK=$(mktemp -d)
          cd "$WORK"

          echo "::group::generate — real SBOM from a real requirements.txt"
          cat > requirements.txt << 'EOF'
          click>=8.1.0
          rich>=13.7.0
          requests>=2.31.0
          EOF
          $SA generate . --output sbom.json --name "ci-test-project"
          cat sbom.json
          python3 -c "
          import json
          sbom = json.load(open('sbom.json'))
          assert sbom['bomFormat'] == 'CycloneDX'
          assert len(sbom['components']) == 3
          print('OK: SBOM generated with 3 components')
          "
          echo "::endgroup::"

          echo "::group::scan — real network call to OSV.dev, scanning this repo's own real dependencies"
          # Uses this checked-out repo's own real requirements.txt,
          # which genuinely has real, currently-maintained dependencies
          # -- the point here is confirming the real OSV.dev query
          # completes successfully end-to-end (request built correctly,
          # response parsed correctly), not necessarily that any
          # specific vulnerability is found.
          $SA scan "$GITHUB_WORKSPACE" --json /tmp/scan_results.json || true
          cat /tmp/scan_results.json
          python3 -c "
          import json
          findings = json.load(open('/tmp/scan_results.json'))
          assert len(findings) >= 1, 'expected at least one finding (even a clean INFO result)'
          print(f'OK: OSV.dev query completed, {len(findings)} finding(s)')
          "
          echo "::endgroup::"

          echo "All integration checks passed."

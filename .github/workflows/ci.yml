name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*
      - name: Install built wheel in a clean venv
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install "$(echo dist/*.whl)"
          /tmp/smoke-venv/bin/sbom-audit --version
          /tmp/smoke-venv/bin/sbom-audit --help

      - name: "Integration test: real commands, including a real OSV.dev network call"
        # This job's whole point includes verifying the ONE thing that
        # genuinely could not be tested from this project's own local
        # dev sandbox: a real network call to api.osv.dev is not
        # reachable from that environment's network egress allowlist,
        # so this is the first real verification that check_vulnerabilities
        # actually works against the live service, not just against an
        # injected fake transport (already covered by the unit tests).
        run: |
          set -uo pipefail
          trap 'echo "::error::Integration test failed at line $LINENO: $BASH_COMMAND"' ERR
          set -e
          SA=/tmp/smoke-venv/bin/sbom-audit
          WORK=$(mktemp -d)
          cd "$WORK"

          echo "::group::generate — real SBOM from a real requirements.txt"
          cat > requirements.txt << 'EOF'
          click>=8.1.0
          rich>=13.7.0
          requests>=2.31.0
          EOF
          $SA generate . --output sbom.json --name "ci-test-project"
          cat sbom.json
          python3 -c "
          import json
          sbom = json.load(open('sbom.json'))
          assert sbom['bomFormat'] == 'CycloneDX'
          assert len(sbom['components']) == 3
          print('OK: SBOM generated with 3 components')
          "
          echo "::endgroup::"

          echo "::group::generate — real SBOM from a mixed npm + Go project (no Python manifests)"
          NODE_GO_DIR=$(mktemp -d)
          cat > "$NODE_GO_DIR/package.json" << 'EOF'
          {"dependencies": {"express": "^4.18.2"}}
          EOF
          cat > "$NODE_GO_DIR/go.mod" << 'EOF'
          module example.com/ci-test
          go 1.22
          require github.com/pkg/errors v0.9.1
          EOF
          $SA generate "$NODE_GO_DIR" --output "$NODE_GO_DIR/sbom.json" --name "ci-test-polyglot"
          cat "$NODE_GO_DIR/sbom.json"
          python3 -c "
          import json
          sbom = json.load(open('$NODE_GO_DIR/sbom.json'))
          names = {c['name'] for c in sbom['components']}
          assert names == {'express', 'github.com/pkg/errors'}, names
          print('OK: SBOM generated with npm + Go components')
          "
          echo "::endgroup::"

          echo "::group::generate — real SBOM from Rust Cargo.lock + Ruby Gemfile.lock"
          RUST_RUBY_DIR=$(mktemp -d)
          cat > "$RUST_RUBY_DIR/Cargo.lock" << 'EOF'
          version = 3

          [[package]]
          name = "serde"
          version = "1.0.197"
          source = "registry+https://github.com/rust-lang/crates.io-index"
          EOF
          cat > "$RUST_RUBY_DIR/Gemfile.lock" << 'EOF'
          GEM
            remote: https://rubygems.org/
            specs:
              rails (7.0.4)
                actionpack (= 7.0.4)
              actionpack (7.0.4)

          PLATFORMS
            ruby

          DEPENDENCIES
            rails
          EOF
          $SA generate "$RUST_RUBY_DIR" --output "$RUST_RUBY_DIR/sbom.json" --name "ci-test-rust-ruby"
          cat "$RUST_RUBY_DIR/sbom.json"
          python3 -c "
          import json
          sbom = json.load(open('$RUST_RUBY_DIR/sbom.json'))
          by_name = {c['name']: c['purl'] for c in sbom['components']}
          assert by_name == {
              'serde': 'pkg:cargo/serde@1.0.197',
              'rails': 'pkg:gem/rails@7.0.4',
              'actionpack': 'pkg:gem/actionpack@7.0.4',
          }, by_name
          print('OK: SBOM generated with Rust + Ruby components')
          "
          echo "::endgroup::"

          echo "::group::generate --licenses — real license lookups against real npm + PyPI"
          LICENSE_DIR=$(mktemp -d)
          cat > "$LICENSE_DIR/requirements.txt" << 'EOF'
          click==8.1.7
          requests==2.31.0
          EOF
          cat > "$LICENSE_DIR/package.json" << 'EOF'
          {"dependencies": {"express": "4.18.2"}}
          EOF
          $SA generate "$LICENSE_DIR" --output "$LICENSE_DIR/sbom.json" --name "ci-test-licenses" --licenses
          cat "$LICENSE_DIR/sbom.json"
          python3 -c "
          import json
          sbom = json.load(open('$LICENSE_DIR/sbom.json'))
          by_name = {c['name']: c.get('licenses') for c in sbom['components']}
          # click 8.1.7 and express 4.18.2 report a clean SPDX id
          # (confirmed manually against the live registries before
          # writing this check); requests 2.31.0's raw PyPI license
          # field ('Apache 2.0') isn't an exact SPDX id, so it's
          # expected as free-text -- both outcomes are covered.
          assert by_name['click'] == [{'license': {'id': 'BSD-3-Clause'}}], by_name
          assert by_name['express'] == [{'license': {'id': 'MIT'}}], by_name
          assert by_name['requests'] == [{'license': {'name': 'Apache 2.0'}}], by_name
          print('OK: generate --licenses completed against real npm + PyPI registries')
          "
          echo "::endgroup::"

          echo "::group::scan — real network call to OSV.dev, scanning this repo's own real dependencies"
          # Uses this checked-out repo's own real requirements.txt,
          # which genuinely has real, currently-maintained dependencies
          # -- the point here is confirming the real OSV.dev query
          # completes successfully end-to-end (request built correctly,
          # response parsed correctly), not necessarily that any
          # specific vulnerability is found.
          $SA scan "$GITHUB_WORKSPACE" --json /tmp/scan_results.json --sarif /tmp/scan_results.sarif || true
          cat /tmp/scan_results.json
          cat /tmp/scan_results.sarif
          python3 -c "
          import json
          findings = json.load(open('/tmp/scan_results.json'))
          assert len(findings) >= 1, 'expected at least one finding (even a clean INFO result)'
          print(f'OK: OSV.dev query completed, {len(findings)} finding(s)')

          sarif = json.load(open('/tmp/scan_results.sarif'))
          assert sarif['version'] == '2.1.0'
          assert sarif['runs'][0]['tool']['driver']['name'] == 'sbom-audit'
          # The clean-scan INFO finding is excluded from SARIF results
          # (not an actionable alert), so results can legitimately be
          # empty even though the JSON findings list is not.
          print(f\"OK: SARIF report generated with {len(sarif['runs'][0]['results'])} result(s)\")
          "
          echo "::endgroup::"

          echo "::group::cra-report — real CRA Annex I Part II mapping, including a real OSV.dev scan"
          $SA cra-report "$GITHUB_WORKSPACE" --output /tmp/cra_report.json
          cat /tmp/cra_report.json
          python3 -c "
          import json
          report = json.load(open('/tmp/cra_report.json'))
          points = {r['point'] for r in report['requirements']}
          assert points == {str(n) for n in range(1, 9)}, points
          assert report['requirements'][0]['status'] == 'SATISFIED'
          print('OK: CRA mapping report generated with all 8 points')
          "
          echo "::endgroup::"

          echo "::group::provenance-check — real registry queries against real npm + PyPI"
          PROV_DIR=$(mktemp -d)
          cat > "$PROV_DIR/requirements.txt" << 'EOF'
          pip==26.1.2
          click==8.1.7
          EOF
          cat > "$PROV_DIR/package.json" << 'EOF'
          {"dependencies": {"sigstore": "5.0.0", "express": "4.18.2"}}
          EOF
          $SA provenance-check "$PROV_DIR" --json /tmp/provenance.json
          cat /tmp/provenance.json
          python3 -c "
          import json
          results = json.load(open('/tmp/provenance.json'))
          by_pkg = {r['package']: r['status'] for r in results}
          # pip 26.1.2 and sigstore 5.0.0 are real, currently-attested
          # releases (confirmed manually against the live registries
          # before writing this check) -- click and express are real,
          # currently-unattested releases, so both outcomes are covered.
          assert by_pkg['pip'] == 'ATTESTED', by_pkg
          assert by_pkg['sigstore'] == 'ATTESTED', by_pkg
          assert by_pkg['click'] == 'NOT_ATTESTED', by_pkg
          assert by_pkg['express'] == 'NOT_ATTESTED', by_pkg
          print('OK: provenance-check completed against real npm + PyPI registries')
          "
          echo "::endgroup::"

          echo "All integration checks passed."
